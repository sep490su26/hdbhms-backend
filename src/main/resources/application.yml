server:
  port: 8080
  forward-headers-strategy: framework
  tomcat:
    max-swallow-size: 30MB
spring:
  application:
    name: hdbhms
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  profiles:
    active: dev
  autoconfigure:
    exclude:
  #      - org.springframework.boot.autoconfigure.cache.JCacheCacheConfiguration
  main:
    allow-circular-references: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:${SMTP_MAIL_USERNAME:}}
    password: ${GMAIL_APP_PASSWORD:${SMTP_MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  cache:
    cache-names:
      - role-permissions
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
twillio:
  account-sid: ${TWILLIO_ACCOUNT_SID}
  auth-token: ${TWILLIO_AUTH_TOKEN}
  from-number: ${TWILLIO_FROM_NUMBER}
esms:
  api-key: ${ESMS_API_KEY}
  secret-key: ${ESMS_SECRET_KEY}
  brand-name: ${ESMS_BRAND_NAME}
app:
  jwt:
    secret: ${APP_JWT_SECRET:${SIGNER_KEY}}
    access-token-expiration-minutes: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
  auth:
    token-secret: ${SIGNER_KEY}
    token-expiration-sec: 3600 #1h
    token-refresh-sec: 2592000 #30d
  default:
    owner:
      email: ${OWNER_EMAIL}
      phone: ${OWNER_PHONE}
      password: ${OWNER_PASSWORD}
      full-name: ${OWNER_FULL_NAME}
  payment:
    provider: ${APP_PAYMENT_PROVIDER:payos}
    payos:
      client-id: ${PAYOS_CLIENT_ID:${PAY_OS_CLIENT_ID:}}
      api-key: ${PAYOS_API_KEY:${PAY_OS_API_KEY:}}
      checksum-key: ${PAYOS_CHECKSUM_KEY:${PAY_OS_CHECKSUM_KEY:}}
      return-url: ${PAYOS_RETURN_URL:}
      cancel-url: ${PAYOS_CANCEL_URL:}
