server:
  port: 8080
  forward-headers-strategy: framework
spring:
  application:
    name: hdbhms
  profiles:
    active: dev
  autoconfigure:
    exclude:
  #      - org.springframework.boot.autoconfigure.cache.JCacheCacheConfiguration
  main:
    allow-circular-references: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:${SMTP_MAIL_USERNAME:}}
    password: ${GMAIL_APP_PASSWORD:${SMTP_MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  cache:
    cache-names:
      - role-permissions
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m
  jackson:
    property-naming-strategy: SNAKE_CASE
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
app:
  jwt:
    secret: ${APP_JWT_SECRET:${SIGNER_KEY}}
    access-token-expiration-minutes: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
  auth:
    token-secret: ${SIGNER_KEY}
    token-expiration-sec: 3600 #1h
    token-refresh-sec: 2592000 #30d
  default:
    owner:
      email: ${OWNER_EMAIL}
      phone: ${OWNER_PHONE}
      password: ${OWNER_PASSWORD}
  reset-password:
    reset-password-confirmation-url: localhost:300/fshs/confirm-reset
  payment:
    provider: vnpay
    payos:
      client-id: ${PAY_OS_CLIENT_ID}
      api-key: ${PAY_OS_API_KEY}
      checksum-key: ${PAY_OS_CHECKSUM_KEY}
      return-url: https://unaudited-hazy-unnerve.ngrok-free.dev/api/v1/webhook/payos
      cancel-url: https://api.payos.vn
    vnpay:
      tmn-code: ${VNPAY_TMN_CODE}
      hash-secret: ${VNPAY_HASH_SECRET}
      url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      return-url: https://unaudited-hazy-unnerve.ngrok-free.dev/api/v1/webhook/vnpay/ipn
  file:
    download:
      prefix: ${DOWNLOAD_PREFIX}
    temp:
      directory: ${TEMP_PATH}
    storage:
      directory: ${INTERNAL_STORAGE_PATH}
      max-concurrency: 20
      max-batch-size: 100
      retry:
        max_attempts: 3
        initial-delay: 500
        multiplier: 2
        timeout: 300
redisson:
  bloom-filter:
    redis-url: redis://${REDIS_HOST}:${REDIS_PORT}
  cache:
    duration-mins: 30
