server:
  port: 8080
  forward-headers-strategy: framework
spring:
  application:
    name: hdbhms
  profiles:
    active: dev
  autoconfigure:
    exclude:
  #      - org.springframework.boot.autoconfigure.cache.JCacheCacheConfiguration
  main:
    allow-circular-references: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:${SMTP_MAIL_USERNAME:}}
    password: ${GMAIL_APP_PASSWORD:${SMTP_MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  cache:
    cache-names:
      - role-permissions
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m
  jackson:
    property-naming-strategy: SNAKE_CASE
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
app:
  jwt:
    secret: ${APP_JWT_SECRET:${SIGNER_KEY}}
    access-token-expiration-minutes: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
  auth:
    token-secret: ${SIGNER_KEY}
    token-expiration-sec: 3600 #1h
    token-refresh-sec: 2592000 #30d
  default:
    owner:
      email: ${OWNER_EMAIL}
      phone: ${OWNER_PHONE}
      password: ${OWNER_PASSWORD}
      full-name: ${OWNER_FULL_NAME}
  reset-password:
    web-confirmation-url: localhost:3000//confirm-reset
    mobile-confirmation-url: https://hdbhms-mobile-auto.com/reset-password
  payment:
    provider: ${APP_PAYMENT_PROVIDER:vnpay}
    payos:
      client-id: ${PAYOS_CLIENT_ID:${PAY_OS_CLIENT_ID:}}
      api-key: ${PAYOS_API_KEY:${PAY_OS_API_KEY:}}
      checksum-key: ${PAYOS_CHECKSUM_KEY:${PAY_OS_CHECKSUM_KEY:}}
      return-url: ${PAYOS_RETURN_URL:}
      cancel-url: ${PAYOS_CANCEL_URL:}
    vnpay:
      tmn-code: ${VNPAY_TMN_CODE}
      hash-secret: ${VNPAY_HASH_SECRET}
      url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      return-url: ${VNPAY_RETURN_URL:}
  deposit:
    amount: ${APP_DEPOSIT_AMOUNT:2000}
    payment:
      receiver-name: ${DEPOSIT_PAYMENT_RECEIVER_NAME:HAIDANG}
      bank-name: ${DEPOSIT_PAYMENT_BANK_NAME:PayOS/VietQR}
      account-number: ${DEPOSIT_PAYMENT_ACCOUNT_NUMBER:}
  file:
    download:
      prefix: ${DOWNLOAD_PREFIX}
    temp:
      directory: ${TEMP_PATH}
    storage:
      directory: ${INTERNAL_STORAGE_PATH}
      max-concurrency: 20
      max-batch-size: 100
      retry:
        max_attempts: 3
        initial-delay: 500
        multiplier: 2
        timeout: 300
redisson:
  bloom-filter:
    redis-url: redis://${REDIS_HOST}:${REDIS_PORT}
  cache:
    duration-mins: 30
