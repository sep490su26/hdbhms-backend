spring:
  config:
    activate:
      on-profile: dev
    import: optional:file:.env.dev[.properties]
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?serverTimezone=UTC
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      auto-create: ${KAFKA_ADMIN_AUTO_CREATE:false}
    # Producer defaults
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Optional: request acks, retries
      properties:
        acks: all
        retries: 3
    # Consumer defaults
    consumer:
      group-id: hdbhms-notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false   # you can commit manually or let auto
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:false}
      ack-mode: manual
  jpa:
    hibernate:
      ddl-auto: validate
  #    show-sql: true
  #    properties:
  #      hibernate:
  #        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:migration/dev
    baseline-version: 0
redisson:
  bloom-filter:
    redis-url: ${REDIS_URL:redis://localhost:6379}
  cache:
    duration-mins: 30
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
app:
  reset-password:
    web-confirmation-url: localhost:3000//confirm-reset
    mobile-confirmation-url: https://hdbhms-mobile-auto.com/reset-password
  file:
    download:
      prefix: ${DOWNLOAD_PREFIX}
    temp:
      directory: ${TEMP_PATH}
    storage:
      directory: ${INTERNAL_STORAGE_PATH}
      max-concurrency: 20
      max-batch-size: 100
      retry:
        max_attempts: 3
        initial-delay: 500
        multiplier: 2
        timeout: 300
