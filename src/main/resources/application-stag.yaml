spring:
  config:
    activate:
      on-profile: stag
    import: optional:file:.env.stag[.properties]
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?ssl-mode=REQUIRED&serverTimezone=UTC
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      url: ${REDIS_URL}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    # Producer defaults
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Optional: request acks, retries
      properties:
        acks: all
        retries: 3
    # Consumer defaults
    consumer:
      group-id: hdbhms-notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false   # you can commit manually or let auto
    listener:
      ack-mode: manual
    properties:
      security.protocol: SASL_SSL

      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: >
        org.apache.kafka.common.security.scram.ScramLoginModule required
        username="${KAFKA_USERNAME}"
        password="${KAFKA_PASSWORD}";

      ssl.truststore.location: ./certs/kafka.truststore.jks
      ssl.truststore.password: ${KAFKA_TRUSTSTORE_PASSWORD}
      ssl.truststore.type: JKS
  jpa:
    hibernate:
      ddl-auto: validate
  #    show-sql: true
  #    properties:
  #      hibernate:
  #        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:migration/dev
    baseline-version: 0
redisson:
  bloom-filter:
    redis-url: ${REDIS_URL}
  cache:
    duration-mins: 30
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS}
  mock-payment:
    enabled: false
  reset-password:
    web-confirmation-url: ${APP_RESET_PASSWORD_WEB_CONFIRMATION_URL:http://localhost:3000/confirm-reset}
    mobile-confirmation-url: https://hdbhms-mobile-auto.com/reset-password
  file:
    download:
      prefix: ${DOWNLOAD_PREFIX}
    temp:
      directory: ${TEMP_PATH}
    storage:
      directory: ${INTERNAL_STORAGE_PATH}
      max-concurrency: 20
      max-batch-size: 100
      retry:
        max_attempts: 3
        initial-delay: 500
        multiplier: 2
        timeout: 300
