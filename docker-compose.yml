services:
  mysql:
    image: mysql:8.0.40-debian
    container_name: "hdbhms-mysql-data"
    hostname: mysql
    restart: always
    ports:
      - '3307:3306'
    volumes:
      - "hdbhms_mysql_data:/data"
    environment:
      MYSQL_ROOT_PASSWORD: root
  redis:
    image: "redis:latest"
    container_name: "hdbhms-redis-cache"
    ports:
      - "6378:6379"
    volumes:
      - "hdbhms_redis_data:/data"
